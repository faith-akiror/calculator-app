name: Docker Publish

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t faithakiror/calculator-app:latest \
                       -t faithakiror/calculator-app:${{ github.sha }} .

      # 4. Push latest image
      - name: Push latest image
        run: docker push faithakiror/calculator-app:latest

      # 5. Push SHA version image
      - name: Push versioned image
        run: docker push faithakiror/calculator-app:${{ github.sha }}